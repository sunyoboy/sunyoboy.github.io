<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资纪律仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  .header { text-align: center; padding: 20px 0 30px; }
  .header h1 { font-size: 1.6em; color: #f1f5f9; }
  .header p { color: #94a3b8; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(520px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
  .card h2 { font-size: 0.95em; color: #94a3b8; margin-bottom: 12px; font-weight: 500; }
  .card canvas { max-height: 300px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 0.8em; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .footer { text-align: center; padding: 30px 0 10px; color: #475569; font-size: 0.8em; }
</style>
</head>
<body>
<div class="header">
  <h1>📐 投资纪律仪表盘</h1>
  <p>数据范围 2026-05-21 ~ 2026-06-24 · 17 个交易日 · 自动生成</p>
</div>

<div class="grid">

  <!-- 1. 成交额情绪 -->
  <div class="card">
    <h2>📊 成交额 + 成交额情绪</h2>
    <canvas id="chartEmotion"></canvas>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>成交额(亿)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f59e0b;border:dashed 1px #f59e0b"></span>20日均成交额</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>情绪指数(右轴) &gt;1.3=黄灯 &gt;1.5=红灯</span>
    </div>
  </div>

  <!-- 2. 指数涨跌 -->
  <div class="card">
    <h2>📈 四大指数 日涨跌幅(%)</h2>
    <canvas id="chartIndices"></canvas>
  </div>

  <!-- 3. 标的收盘价 -->
  <div class="card">
    <h2>⚠️ 高波动标的 收盘价(元)</h2>
    <canvas id="chartStocks"></canvas>
  </div>

  <!-- 4. 合规面板 -->
  <div class="card">
    <h2>🛡️ 纪律合规状态</h2>
    <div id="statusPanel" style="display:flex;flex-direction:column;gap:14px;padding:10px 0;"></div>
  </div>

</div>

<div class="footer">数据源: 每日复盘文件 + 新浪/腾讯财经API · 仅供参考，不构成投资建议</div>

<script>
const dates = ["05-21", "05-22", "05-25", "05-26", "05-27", "05-28", "06-01", "06-02", "06-03", "06-04", "06-05", "06-08", "06-17", "06-18", "06-22", "06-23", "06-24"];

// ── 1. 成交额情绪 ──
new Chart(document.getElementById('chartEmotion'), {
  type: 'bar',
  data: {
    labels: dates,
    datasets: [
      {
        label: '成交额(亿)', data: [35000.0, 13000.0, 1397.16, 1478.05, 32400.000000000004, 1369.03, 28800.0, 27900.0, 31500.0, 27500.0, 31000.0, 28200.0, 30900.0, 1422.23, 37400.0, 1516.46, null],
        backgroundColor: ctx => {
          const v = ctx.raw; if (!v) return 'rgba(100,116,139,0.3)';
          return v > 35000 ? 'rgba(248,113,113,0.6)' : v > 30000 ? 'rgba(251,191,36,0.5)' : 'rgba(96,165,250,0.5)';
        }, borderWidth: 0, yAxisID: 'y', order: 2
      },
      {
        label: '20日均(亿)', data: [null, null, null, null, 16655.0, 14107.4, 16206.3, 17668.0, 19204.9, 20034.4, 21031.3, 21628.7, 22341.9, 20847.6, 21951.1, 20673.9, null],
        type: 'line', borderColor: '#f59e0b', borderDash: [4,3], borderWidth: 1.5,
        pointRadius: 0, fill: false, yAxisID: 'y', order: 1
      },
      {
        label: '情绪', data: [null, null, null, null, 1.95, 0.1, 1.78, 1.58, 1.64, 1.37, 1.47, 1.3, 1.38, 0.07, 1.7, 0.07, null],
        type: 'line', borderColor: '#f87171', borderWidth: 2,
        pointRadius: 2, pointBackgroundColor: '#f87171', fill: false, yAxisID: 'y1', order: 0
      }
    ]
  },
  options: {
    responsive: true, interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { display: false } },
    scales: {
      y: { type: 'linear', position: 'left', title: { display: true, text: '成交额(亿)', color: '#94a3b8' }, ticks: { color:'#94a3b8' }, grid: { color:'#334155' } },
      y1: { type: 'linear', position: 'right', title: { display: true, text: '情绪指数', color: '#f87171' }, ticks: { color:'#f87171' }, grid: { drawOnChartArea: false }, min: 0.5, max: 2.0 }
    }
  }
});

// ── 2. 指数涨跌幅 ──
const idxDS = [];
idxDS.push({label:'上证指数',data:[-2.04, 0.87, 0.96, -0.46, -1.25, 0.12, -0.27, 0.43, 0.22, -0.64, -0.74, -1.7, 0.4, -0.43, 1.78, -1.37, -1.37],borderColor:'#f87171',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
idxDS.push({label:'深证成指',data:[-2.07, 2.3, 1.66, -0.08, -0.88, 0.8, -1.51, 1.63, 0.73, -0.27, -2.21, -3.22, 1.31, 0.94, 2.13, -3.17, -3.17],borderColor:'#60a5fa',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
idxDS.push({label:'创业板指',data:[-2.35, null, 2.1, 0.55, 0.07, 1.96, null, 2.66, 1.65, -0.83, -3.2, -3.69, 1.56, 2.05, 2.52, -3.84, -3.84],borderColor:'#4ade80',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
idxDS.push({label:'科创50',data:[null, null, null, -2.05, -2.8, 1.59, -5.0, 1.62, null, 0.69, -4.01, -4.3, 4.69, 3.84, 1.96, -1.68, -1.68],borderColor:'#c084fc',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
new Chart(document.getElementById('chartIndices'), {
  type: 'line',
  data: { labels: dates, datasets: idxDS },
  options: {
    responsive: true, interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { position:'top', labels:{ color:'#94a3b8', usePointStyle:true } } },
    scales: { y: { title:{ display:true, text:'%', color:'#94a3b8' }, ticks:{ color:'#94a3b8' }, grid:{ color:'#334155' } }, x: { ticks:{ color:'#64748b', maxRotation:60 } } }
  }
});

// ── 3. 标的收盘价 ──
const stkDS = [];
stkDS.push({label:'天山铝业(1天)',data:[null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, 11.8],borderColor:'#f97316',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
stkDS.push({label:'紫金矿业(2天)',data:[null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, 27.75, 27.75],borderColor:'#a78bfa',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
stkDS.push({label:'黄金ETF(2天)',data:[null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, 8.95, 8.95],borderColor:'#facc15',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
stkDS.push({label:'科大讯飞(2天)',data:[null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, 42.25, 42.25],borderColor:'#38bdf8',borderWidth:1.5,pointRadius:1.5,tension:0.1,spanGaps:false});
new Chart(document.getElementById('chartStocks'), {
  type: 'line',
  data: { labels: dates, datasets: stkDS },
  options: {
    responsive: true, interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { position:'top', labels:{ color:'#94a3b8', usePointStyle:true } } },
    scales: { y: { title:{ display:true, text:'元', color:'#94a3b8' }, ticks:{ color:'#94a3b8' }, grid:{ color:'#334155' } }, x: { ticks:{ color:'#64748b', maxRotation:60 } } }
  }
});

// ── 4. 合规面板 ──
(function() {
  const panel = document.getElementById('statusPanel');
  const items = [
    { label:'成交额情绪', value: null === null ? '—' : null.toFixed(2),
       detail: null === null ? '' : ('近20日均 ' + null.toFixed(0) + '亿'),
       status: null === null ? '⏳' : (null > 1.5 ? '🔴' : (null > 1.3 ? '🟡' : '🟢')),
       tip: '>1.5=高潮禁仓, >1.3=偏热谨慎, <1.3=正常' },
    { label:'最新成交额', value: null === null ? '—' : (null/10000).toFixed(2)+'万亿',
       status: null === null ? '⏳' : (null > 35000 ? '🔴' : '🟢'),
       tip: '>3.5万亿=情绪高潮, <2万亿=情绪冰点' },
    { label:'仓位合规', value: '✅ 全部绿灯', status:'🟢', tip:'单品种≤10%, 同板块≤20%, 现金≥50%' },
    { label:'杠杆', value: '0', status:'🟢', tip:'普通投资者唯一正确数值' },
  ];
  items.forEach(it => {
    panel.innerHTML += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0f172a;border-radius:8px;">
      <div><strong>${it.label}</strong><div style="font-size:0.75em;color:#64748b;">${it.tip||''}</div></div>
      <div style="text-align:right;"><span style="font-size:1.2em;">${it.status}</span> <span style="font-size:0.9em;color:#94a3b8;margin-left:8px;">${it.value}</span></div>
    </div>`;
  });
})();
</script>
</body>
</html>
